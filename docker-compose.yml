# OpenDeepSeek - docker-compose.yml
# Project: OpenDeepSeek (一键部署本地 Agentic ChatGPT 替代品)
# Version: v0.3.0 — Open WebUI 直连 DeepSeek（架构简化）
# Architecture (默认):  Open WebUI ─→ DeepSeek API
# Architecture (advanced): Open WebUI ─→ DeepSeek API
#                          Hermes ─→ OpenRouter/其他 LLM（用户接 IM 时启用）
# Usage:
#   docker compose up -d                          → 默认（Open WebUI + DeepSeek，普通用户）
#   docker compose --profile advanced up -d        → 含 Hermes（IM 桥接 / Cron / Skills）
#   docker compose --profile full up -d            → 含 SearXNG 联网搜索
# Network binding: 默认绑定 127.0.0.1（仅本机），跨网络访问请在 .env 设置 BIND_HOST=0.0.0.0

services:
  # ═══════════════════════════════════════════════════════════════════════
  # Hermes Agent (可选 — 仅在用户接 IM/Cron/Skills 时启用)
  # 注意：Hermes 不原生支持 DeepSeek 作为 LLM provider
  #       启用此 profile 需要额外 OpenRouter / Anthropic / Kimi 等 API key
  # ═══════════════════════════════════════════════════════════════════════
  hermes:
    image: nousresearch/hermes-agent:v2026.4.23
    container_name: opendeepseek-hermes
    profiles:
      - "advanced"
    command: gateway run
    ports:
      - "${BIND_HOST:-127.0.0.1}:8642:8642"
    environment:
      # Hermes 自己的 LLM provider（OpenRouter 推荐，接 DeepSeek 走 openrouter/deepseek 路由）
      - "OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}"
      - HERMES_INFERENCE_PROVIDER=${HERMES_INFERENCE_PROVIDER:-openrouter}
      - DEFAULT_MODEL=${HERMES_DEFAULT_MODEL:-deepseek/deepseek-chat}
      - API_SERVER_ENABLED=true
      - "API_SERVER_KEY=${HERMES_API_KEY:-hermes-default-key}"
      - API_SERVER_PORT=8642
      - API_SERVER_HOST=0.0.0.0
      # ── IM Bridge Integrations (uncomment as needed) ──
      # DingTalk
      # - DINGTALK_CLIENT_ID=
      # - DINGTALK_CLIENT_SECRET=
      # Feishu / Lark
      # - FEISHU_APP_ID=
      # - FEISHU_APP_SECRET=
      # WeCom
      # - WECOM_BOT_ID=
      # - WECOM_BOT_SECRET=
      # Email
      # - EMAIL_ADDRESS=
      # - EMAIL_PASSWORD=
      # - EMAIL_IMAP_HOST=
      # - EMAIL_SMTP_HOST=
      # QQ Bot
      # - QQ_APP_ID=
      # - QQ_CLIENT_SECRET=
      # Matrix
      # - MATRIX_HOMESERVER=
      # - MATRIX_ACCESS_TOKEN=
      # - MATRIX_USER_ID=
      # Webhook
      # - WEBHOOK_ENABLED=false
      # - WEBHOOK_PORT=8080
    volumes:
      - hermes-data:/opt/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8642/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - opendeepseek-network

  # ═══════════════════════════════════════════════════════════════════════
  # Open WebUI (主服务) — 直连 DeepSeek API
  # ═══════════════════════════════════════════════════════════════════════
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.2
    container_name: opendeepseek-webui
    ports:
      - "${BIND_HOST:-127.0.0.1}:3000:8080"
    environment:
      # 🔴 直连 DeepSeek（不经过 Hermes — Hermes 不支持 DeepSeek 作为 LLM provider）
      - OPENAI_API_BASE_URL=https://api.deepseek.com/v1
      - "OPENAI_API_KEY=${DEEPSEEK_API_KEY:?Missing required: DEEPSEEK_API_KEY (run ./setup.sh)}"
      - WEBUI_NAME=OpenDeepSeek
      - "WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?Missing required: WEBUI_SECRET_KEY (run ./setup.sh)}"
      - DEFAULT_LOCALE=zh-CN
      - ENABLE_RAG_HYBRID_SEARCH=true
      - ENABLE_CODE_INTERPRETER=true
      # ─── 小白模式：零门槛访问 ─────────────────────────
      # WEBUI_AUTH=false 跳过登录（仅适合家庭单机/Tailscale 私有网络）
      # 公网部署务必改为 true 并配反向代理
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      # 默认预选模型 ID（DeepSeek 真实模型名，用户能看懂）
      - DEFAULT_MODELS=${DEFAULT_MODELS_FRONTEND:-deepseek-v4-flash}
      # 模型选择器置顶
      - DEFAULT_PINNED_MODELS=deepseek-v4-flash,deepseek-v4-pro
      # 联网搜索默认启用（配合 SearXNG profile 使用）
      - ENABLE_RAG_WEB_SEARCH=true
      # SearXNG 后端（仅 --profile full 启用 SearXNG 时生效）
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    volumes:
      - open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - opendeepseek-network

  searxng:
    image: searxng/searxng:2026.4.28-ed5955a5c
    container_name: opendeepseek-searxng
    profiles:
      - "full"
    ports:
      - "${BIND_HOST:-127.0.0.1}:8889:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    networks:
      - opendeepseek-network

volumes:
  hermes-data:
  open-webui-data:

networks:
  opendeepseek-network:
    name: opendeepseek-network
    driver: bridge
