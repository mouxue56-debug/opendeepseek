# OpenDeepSeek - docker-compose.yml
# Project: OpenDeepSeek (一键部署本地 Agentic ChatGPT 替代品)
# Version: v2026.4.23
# Architecture: Open WebUI (终端) → Hermes Agent Gateway (内核) → DeepSeek V4 (模型)
# Generated: 2026-04-27
# Usage: docker compose up -d (默认启动) | docker compose --profile full up -d (含 SearXNG)

services:
  hermes:
    image: nousresearch/hermes-agent:v2026.4.23
    container_name: opendeepseek-hermes
    command: gateway run
    ports:
      - "8642:8642"
    environment:
      - OPENAI_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_BASE_URL=https://api.deepseek.com/v1
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek/deepseek-v4-flash}
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_API_KEY}
      - API_SERVER_PORT=8642
      - API_SERVER_HOST=0.0.0.0
      # ── IM Bridge Integrations (uncomment as needed) ──
      # DingTalk
      # - DINGTALK_CLIENT_ID=
      # - DINGTALK_CLIENT_SECRET=
      # Feishu / Lark
      # - FEISHU_APP_ID=
      # - FEISHU_APP_SECRET=
      # WeCom
      # - WECOM_BOT_ID=
      # - WECOM_BOT_SECRET=
      # Email
      # - EMAIL_ADDRESS=
      # - EMAIL_PASSWORD=
      # - EMAIL_IMAP_HOST=
      # - EMAIL_SMTP_HOST=
      # QQ Bot
      # - QQ_APP_ID=
      # - QQ_CLIENT_SECRET=
      # Matrix
      # - MATRIX_HOMESERVER=
      # - MATRIX_ACCESS_TOKEN=
      # - MATRIX_USER_ID=
      # Webhook
      # - WEBHOOK_ENABLED=false
      # - WEBHOOK_PORT=8080
    volumes:
      - hermes-data:/opt/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8642/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - opendeepseek-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.2
    container_name: opendeepseek-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://hermes:8642/v1
      - OPENAI_API_KEY=${HERMES_API_KEY}
      - WEBUI_NAME=OpenDeepSeek
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - DEFAULT_LOCALE=zh-CN
      - ENABLE_RAG_HYBRID_SEARCH=true
      - ENABLE_CODE_INTERPRETER=true
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      hermes:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - opendeepseek-network

  searxng:
    image: searxng/searxng:2024.12.16-0
    container_name: opendeepseek-searxng
    profiles:
      - "full"
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    networks:
      - opendeepseek-network

volumes:
  hermes-data:
  open-webui-data:

networks:
  opendeepseek-network:
    name: opendeepseek-network
    driver: bridge
