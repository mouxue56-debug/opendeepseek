# OpenDeepSeek CN - docker-compose.cn.yml
# China-friendly compose file.
#
# This file is intentionally separate from docker-compose.yml:
# - it keeps Chinese defaults and dependency mirrors
# - it exposes only Open WebUI by default
# - Hermes, Bridge, and SearXNG stay on the Docker internal network
#
# The defaults are public images that actually exist today. When CN registry
# images are published, override *_IMAGE in .env instead of editing this file.

services:
  hermes:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:v2026.4.23}
    container_name: opendeepseek-hermes
    command: gateway run
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      - HERMES_INFERENCE_PROVIDER=${HERMES_INFERENCE_PROVIDER:-deepseek}
      - OPDS_LLM_PROVIDER=${OPDS_LLM_PROVIDER:-deepseek}
      - OPDS_LLM_BASE_URL=${OPDS_LLM_BASE_URL:-}
      - OPDS_LLM_API_KEY=${OPDS_LLM_API_KEY:-}
      - OPDS_LLM_MODEL=${OPDS_LLM_MODEL:-deepseek-v4-flash}
      - OPDS_LLM_PRO_MODEL=${OPDS_LLM_PRO_MODEL:-deepseek-v4-pro}
      - OPDS_CUSTOM_LLM_BASE_URL=${OPDS_CUSTOM_LLM_BASE_URL:-}
      - OPDS_CUSTOM_LLM_API_KEY=${OPDS_CUSTOM_LLM_API_KEY:-}
      - OPDS_CUSTOM_LLM_MODEL=${OPDS_CUSTOM_LLM_MODEL:-}
      - CUSTOM_MODEL_BASE_URL=${CUSTOM_MODEL_BASE_URL:-}
      - CUSTOM_MODEL_API_KEY=${CUSTOM_MODEL_API_KEY:-}
      - CUSTOM_MODEL_NAME=${CUSTOM_MODEL_NAME:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-v4-flash}
      - HERMES_MAX_ITERATIONS=${HERMES_MAX_ITERATIONS:-24}
      - HERMES_API_TIMEOUT=${HERMES_API_TIMEOUT:-300}
      - HERMES_API_CALL_STALE_TIMEOUT=${HERMES_API_CALL_STALE_TIMEOUT:-120}
      - API_SERVER_ENABLED=true
      - "API_SERVER_KEY=${HERMES_API_KEY:?Missing required: HERMES_API_KEY}"
      - API_SERVER_PORT=8642
      - API_SERVER_HOST=0.0.0.0
      - TERMINAL_ENV=local
      - TERMINAL_CWD=/host
      - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      - UV_INDEX_URL=${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    volumes:
      - hermes-data:/opt/data
      - ${HERMES_HOST_DIR:-./agent-files}:/host:rw
      - ./hermes/skills:/opt/data/skills/opendeepseek:rw
      - ./hermes/SOUL.md:/opt/data/SOUL.md:rw
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8642/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    cpus: "${HERMES_CPUS:-1.5}"
    mem_limit: "${HERMES_MEMORY_LIMIT:-1280m}"
    pids_limit: 128
    networks:
      - opendeepseek-network

  hermes-bridge:
    image: ${BRIDGE_IMAGE:-opendeepseek-hermes-bridge:cn-local}
    build:
      context: ./bridge
    container_name: opendeepseek-hermes-bridge
    ports:
      # 只给本机浏览器预览产物，不随 BIND_HOST 暴露公网。
      - "127.0.0.1:${OPDS_ARTIFACT_PORT:-8770}:8765"
    environment:
      - HERMES_BASE_URL=http://hermes:8642/v1
      - "HERMES_API_KEY=${HERMES_API_KEY:?Missing required: HERMES_API_KEY}"
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      - OPDS_LLM_PROVIDER=${OPDS_LLM_PROVIDER:-deepseek}
      - OPDS_LLM_BASE_URL=${OPDS_LLM_BASE_URL:-}
      - OPDS_LLM_API_KEY=${OPDS_LLM_API_KEY:-}
      - OPDS_LLM_MODEL=${OPDS_LLM_MODEL:-deepseek-v4-flash}
      - OPDS_LLM_PRO_MODEL=${OPDS_LLM_PRO_MODEL:-deepseek-v4-pro}
      - OPDS_CUSTOM_LLM_BASE_URL=${OPDS_CUSTOM_LLM_BASE_URL:-}
      - OPDS_CUSTOM_LLM_API_KEY=${OPDS_CUSTOM_LLM_API_KEY:-}
      - OPDS_CUSTOM_LLM_MODEL=${OPDS_CUSTOM_LLM_MODEL:-}
      - CUSTOM_MODEL_BASE_URL=${CUSTOM_MODEL_BASE_URL:-}
      - CUSTOM_MODEL_API_KEY=${CUSTOM_MODEL_API_KEY:-}
      - CUSTOM_MODEL_NAME=${CUSTOM_MODEL_NAME:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-v4-flash}
      - ENABLE_LIGHTWEIGHT_ROUTING=${ENABLE_LIGHTWEIGHT_ROUTING:-true}
      - HERMES_AGENT_MAX_TOKENS=${HERMES_AGENT_MAX_TOKENS:-32768}
      - HERMES_AGENT_STREAM=${HERMES_AGENT_STREAM:-false}
      - HERMES_PROGRESS_STREAM=${HERMES_PROGRESS_STREAM:-true}
      - IMAGE_BRIDGE_TIMEOUT=${IMAGE_BRIDGE_TIMEOUT:-600}
      - OPDS_SEARCH_PROVIDER=${OPDS_SEARCH_PROVIDER:-auto}
      - OPDS_REALTIME_SEARCH_ENABLED=${OPDS_REALTIME_SEARCH_ENABLED:-false}
      - OPDS_REALTIME_SEARCH_URL=${OPDS_REALTIME_SEARCH_URL:-http://searxng:8080/search?q={query}&format=json}
      - OPDS_REALTIME_SEARCH_TIMEOUT=${OPDS_REALTIME_SEARCH_TIMEOUT:-4}
      - OPDS_REALTIME_SEARCH_MAX_RESULTS=${OPDS_REALTIME_SEARCH_MAX_RESULTS:-6}
      - OPDS_DELEGATE_OPENWEBUI_NATIVE_TOOLS=${OPDS_DELEGATE_OPENWEBUI_NATIVE_TOOLS:-true}
      - OPDS_SHARED_MEMORY_PATH=${OPDS_SHARED_MEMORY_PATH:-/host/OpenDeepSeek-Memory/profile.md}
      - OPDS_MEMORY_SNAPSHOT_MAX_CHARS=${OPDS_MEMORY_SNAPSHOT_MAX_CHARS:-4000}
      - OPDS_HOST_DISPLAY_PREFIX=${OPDS_HOST_DISPLAY_PREFIX:-/host}
      - OPDS_ARTIFACT_ROOT=${OPDS_ARTIFACT_ROOT:-/host/OpenDeepSeek-Outputs}
      - OPDS_ARTIFACT_PUBLIC_BASE_URL=${OPDS_ARTIFACT_PUBLIC_BASE_URL:-http://localhost:8770}
      - OPDS_ARTIFACT_MAX_FILES=${OPDS_ARTIFACT_MAX_FILES:-100}
      - IMAGE_BRIDGE_HOST_ROOT=/host
      - IMAGE_BRIDGE_PUBLIC_HOST_PREFIX=/host
      - IMAGE_BRIDGE_OCR_LANG=chi_sim+eng
    volumes:
      - ${HERMES_HOST_DIR:-./agent-files}:/host:rw
    depends_on:
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    cpus: "${BRIDGE_CPUS:-0.5}"
    mem_limit: "${BRIDGE_MEMORY_LIMIT:-256m}"
    pids_limit: 64
    networks:
      - opendeepseek-network

  open-webui:
    image: ${OPENWEBUI_IMAGE:-openwebui/open-webui:0.9.2}
    container_name: opendeepseek-webui
    ports:
      - "${BIND_HOST:-127.0.0.1}:3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://hermes-bridge:8765/v1
      - "OPENAI_API_KEY=${HERMES_API_KEY:?Missing required: HERMES_API_KEY}"
      - WEBUI_NAME=${WEBUI_NAME:-OpenDeepSeek}
      - "WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?Missing required: WEBUI_SECRET_KEY}"
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-zh-CN}
      - DEFAULT_MODELS=${DEFAULT_MODELS_FRONTEND:-opendeepseek-auto}
      - DEFAULT_PINNED_MODELS=${DEFAULT_PINNED_MODELS:-opendeepseek-auto,opendeepseek-fast,opendeepseek-agent,opendeepseek-deepwork}
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      - ENABLE_COMMUNITY_SHARING=${ENABLE_COMMUNITY_SHARING:-false}
      - ENABLE_VERSION_UPDATE_CHECK=${ENABLE_VERSION_UPDATE_CHECK:-false}
      - ENABLE_EASTER_EGGS=${ENABLE_EASTER_EGGS:-false}
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-false}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - ENABLE_CODE_INTERPRETER=${ENABLE_CODE_INTERPRETER:-false}
      - ENABLE_TITLE_GENERATION=${ENABLE_TITLE_GENERATION:-false}
      - ENABLE_TAGS_GENERATION=${ENABLE_TAGS_GENERATION:-false}
      - ENABLE_FOLLOW_UP_GENERATION=${ENABLE_FOLLOW_UP_GENERATION:-false}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}
      - SEARXNG_QUERY_URL=${SEARXNG_QUERY_URL:-http://searxng:8080/search?q=<query>&format=json}
      - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    volumes:
      - open-webui-data:/app/backend/data
      - ./webui/custom.css:/app/build/static/custom.css:ro
      - ./webui/loader.js:/app/build/static/loader.js:ro
      - ./webui/pwa-prompt.js:/app/build/static/pwa-prompt.js:ro
      - ./webui/pwa-prompt.css:/app/build/static/pwa-prompt.css:ro
    depends_on:
      hermes-bridge:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    cpus: "${WEBUI_CPUS:-1.0}"
    mem_limit: "${WEBUI_MEMORY_LIMIT:-1024m}"
    pids_limit: 160
    networks:
      - opendeepseek-network

  searxng:
    image: ${SEARXNG_IMAGE:-searxng/searxng:2026.4.28-ed5955a5c}
    profiles:
      - "full"
    container_name: opendeepseek-searxng
    environment:
      - SEARXNG_PORT=8080
      - SEARXNG_BIND_ADDRESS=0.0.0.0
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    cpus: "${SEARXNG_CPUS:-0.5}"
    mem_limit: "${SEARXNG_MEMORY_LIMIT:-384m}"
    pids_limit: 96
    networks:
      - opendeepseek-network

volumes:
  hermes-data:
  open-webui-data:

networks:
  opendeepseek-network:
    name: opendeepseek-network
    driver: bridge
